name: Build and Push Multi-Arch Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'versions.env'
      - 'Dockerfile'
      - 'supervisord.conf'
      - 'start.sh'
      - '.github/workflows/build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pepperlink/hermes-suite

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read versions from versions.env
        id: versions
        run: |
          # versions.env is the single source of truth (also updated by Renovate)
          # shellcheck source=/dev/null
          eval "$(grep -E '^(AGENT_VERSION|WEBUI_VERSION)=' versions.env)"

          AGENT_VER_CLEAN="${AGENT_VERSION#v}"
          WEBUI_VER_CLEAN="${WEBUI_VERSION#v}"
          DOCKER_TAG="${AGENT_VER_CLEAN}-${WEBUI_VER_CLEAN}"

          echo "agent_version=${AGENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "webui_version=${WEBUI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"

          echo "Suite tag:     ${DOCKER_TAG}"
          echo "Agent version: ${AGENT_VERSION}"
          echo "WebUI version: ${WEBUI_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGENT_VERSION=${{ steps.versions.outputs.agent_version }}
            HERMES_WEBUI_VERSION=${{ steps.versions.outputs.webui_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.docker_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
